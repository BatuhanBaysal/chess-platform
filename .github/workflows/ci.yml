name: Chess Platform CI

on:
    push:
        branches: [ "main", "feature/**" ]
    pull_request:
        branches: [ "main" ]

jobs:
    backend-build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: '17'
                  distribution: 'corretto'
                  cache: maven

            - name: Build & Test Backend
              run: mvn -B clean install --file chess-backend/pom.xml

    frontend-build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'
                  cache-dependency-path: chess-frontend/package-lock.json

            - name: Install & Build Frontend
              run: |
                  cd chess-frontend
                  npm ci # npm install yerine 'ci' daha hızlı ve güvenlidir (lock file'ı baz alır)
                  npm run build
