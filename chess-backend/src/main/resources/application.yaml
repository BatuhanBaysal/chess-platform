spring:
    application:
        name: chess-backend

    datasource:
        url: ${CHESS_DB_URL}
        username: ${CHESS_DB_USERNAME}
        password: ${CHESS_DB_PASSWORD}
        driver-class-name: org.postgresql.Driver

    liquibase:
        change-log: classpath:db/changelog/db.changelog-master.xml
        enabled: true
        default-schema: public

    jpa:
        open-in-view: false
        hibernate:
            ddl-auto: validate
        show-sql: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
                generate_statistics: false
                jdbc.batch_size: 25
                order_inserts: true
                order_updates: true

    data:
        redis:
            host: ${CHESS_REDIS_HOST:localhost}
            port: ${CHESS_REDIS_PORT:6379}

logging:
    level:
        org.liquibase: INFO
        org.hibernate.SQL: ERROR
        io.opentelemetry: DEBUG
    pattern:
        level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"

management:
    endpoints:
        web:
            exposure:
                include: "health,info,prometheus,metrics"
    endpoint:
        health:
            show-details: always
            show-components: always
            probes:
                enabled: true
    health:
        circuitbreakers:
            enabled: true
        ratelimiters:
            enabled: true
        redis:
            enabled: true
    metrics:
        tags:
            application: ${spring.application.name}
        export:
            prometheus:
                enabled: true
    tracing:
        sampling:
            probability: 1.0
    otlp:
        tracing:
            endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:-http://tempo:4318/v1/traces}

chess:
    security:
        jwt:
            secret-key: ${CHESS_JWT_SECRET}
            expiration: ${CHESS_JWT_EXPIRATION}

resilience4j:
    circuitbreaker:
        configs:
            default:
                registerHealthIndicator: true
                slidingWindowSize: 10
                minimumNumberOfCalls: 5
                permittedNumberOfCallsInHalfOpenState: 3
                waitDurationInOpenState: 10s
                failureRateThreshold: 50
                eventConsumerBufferSize: 10
        instances:
            chessService:
                baseConfig: default
    ratelimiter:
        configs:
            default:
                registerHealthIndicator: true
                limitForPeriod: 5
                limitRefreshPeriod: 1s
                timeoutDuration: 0
        instances:
            authService:
                baseConfig: default
