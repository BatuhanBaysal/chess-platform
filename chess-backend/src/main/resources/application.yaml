spring:
    application:
        name: chess-backend

    datasource:
        url: ${CHESS_DB_URL}
        username: ${CHESS_DB_USERNAME}
        password: ${CHESS_DB_PASSWORD}
        driver-class-name: org.postgresql.Driver

    # Liquibase Configuration
    liquibase:
        change-log: classpath:db/changelog/db.changelog-master.xml
        enabled: true
        default-schema: public

    jpa:
        open-in-view: false
        hibernate:
            ddl-auto: validate
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
                generate_statistics: true
                jdbc.batch_size: 25
                order_inserts: true
                order_updates: true

# Logging Configuration for Liquibase & Hibernate
logging:
    level:
        org.liquibase: INFO
        org.hibernate.SQL: DEBUG
        org.hibernate.type.descriptor.sql.BasicBinder: TRACE

management:
    endpoints:
        web:
            exposure:
                include: "health,info,prometheus,metrics"
    endpoint:
        health:
            show-details: always
    metrics:
        tags:
            application: ${spring.application.name}
    prometheus:
        metrics:
            export:
                enabled: true

chess:
    security:
        jwt:
            secret-key: ${CHESS_JWT_SECRET}
            expiration: ${CHESS_JWT_EXPIRATION}
