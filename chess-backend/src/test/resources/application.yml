spring:
  datasource:
    # Uses H2 in-memory DB with PostgreSQL compatibility mode for isolated and fast unit testing.
    url: jdbc:h2:mem:chess_test_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      # Automatically manages schema lifecycle for each test run.
      ddl-auto: create-drop
    show-sql: true
