spring:
    application:
        name: chess-backend-test

    datasource:
        url: jdbc:h2:mem:chess_test_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
        driver-class-name: org.h2.Driver
        username: sa
        password: ""

    jpa:
        hibernate:
            ddl-auto: create-drop
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.H2Dialect

    cache:
        type: none

    redisson:
        enabled: false

    data:
        redis:
            repositories:
                enabled: false

    autoconfigure:
        exclude:
            - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
            - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
            - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
            - org.redisson.spring.starter.RedissonAutoConfigurationV2

management:
    health:
        redis:
            enabled: false
    endpoints:
        web:
            exposure:
                include: health
    otlp:
        tracing:
            endpoint: http://localhost:4318
    tracing:
        enabled: false

chess:
    security:
        jwt:
            secret-key: ${JWT_SECRET:638B4D6251655468576D5A7134743777217A25432A462D4A614E645267556B58}
            expiration: 3600000
