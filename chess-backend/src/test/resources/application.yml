spring:
  datasource:
    # Uses H2 in-memory DB with PostgreSQL compatibility mode for isolated and fast unit testing.
    url: jdbc:h2:mem:chess_test_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      # Automatically manages schema lifecycle for each test run.
      ddl-auto: create-drop
    show-sql: true

chess:
    security:
        jwt:
            secret-key: 638B4D6251655468576D5A7134743777217A25432A462D4A614E645267556B58 # for test
            expiration: 86400000
