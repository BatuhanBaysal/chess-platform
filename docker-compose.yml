services:
    db:
        image: postgres:15-alpine
        container_name: chess-postgres
        restart: always
        environment:
            POSTGRES_DB: chess_db
            POSTGRES_USER: ${CHESS_DB_USERNAME}
            POSTGRES_PASSWORD: ${CHESS_DB_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - chess-network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${CHESS_DB_USERNAME} -d chess_db"]
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: chess-redis
        restart: always
        ports:
            - "6379:6379"
        networks:
            - chess-network
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 5

    backend:
        build: ./chess-backend
        container_name: chess-server
        restart: always
        ports:
            - "8080:8080"
        volumes:
            - ./logs:/app/logs
        networks:
            - chess-network
        environment:
            CHESS_DB_URL: jdbc:postgresql://db:5432/chess_db
            CHESS_DB_USERNAME: ${CHESS_DB_USERNAME}
            CHESS_DB_PASSWORD: ${CHESS_DB_PASSWORD}
            CHESS_REDIS_HOST: redis
            CHESS_REDIS_PORT: 6379
            CHESS_JWT_SECRET: ${CHESS_JWT_SECRET}
            CHESS_JWT_EXPIRATION: ${CHESS_JWT_EXPIRATION}
            SPRING_LIQUIBASE_ENABLED: "true"
            MANAGEMENT_OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
            MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
            LOGGING_FILE_NAME: /app/logs/chess-backend.log
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test: [ "CMD-SHELL", "nc -z localhost 8080 || exit 1" ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 60s

    frontend:
        build: ./chess-frontend
        container_name: chess-ui
        restart: always
        ports:
            - "80:80"
        networks:
            - chess-network
        environment:
            - VITE_API_URL=http://localhost:8080
        depends_on:
            backend:
                condition: service_healthy

    # --- QUALITY ASSURANCE ---
    sonarqube-db:
        image: postgres:15-alpine
        container_name: chess-sonarqube-db
        restart: always
        environment:
            - POSTGRES_USER=${SONAR_DB_USER}
            - POSTGRES_PASSWORD=${SONAR_DB_PASSWORD}
            - POSTGRES_DB=${SONAR_DB_NAME}
        volumes:
            - sonarqube_db_data:/var/lib/postgresql/data
        networks:
            - chess-network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${SONAR_DB_USER} -d ${SONAR_DB_NAME}"]
            interval: 10s
            timeout: 5s
            retries: 5

    sonarqube:
        image: sonarqube:lts-community
        container_name: chess-sonarqube
        restart: always
        ports:
            - "9000:9000"
        networks:
            - chess-network
        environment:
            - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-db:5432/${SONAR_DB_NAME}
            - SONAR_JDBC_USERNAME=${SONAR_DB_USER}
            - SONAR_JDBC_PASSWORD=${SONAR_DB_PASSWORD}
        depends_on:
            sonarqube-db:
                condition: service_healthy

    # --- OBSERVABILITY (LGTM STACK) ---
    prometheus:
        image: prom/prometheus:latest
        container_name: chess-prometheus
        restart: unless-stopped
        volumes:
            - ./prometheus.yml:/etc/prometheus/prometheus.yml
            - prometheus_data:/prometheus
        command:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
        ports:
            - "9090:9090"
        networks:
            - chess-network
        depends_on:
            - backend

    loki:
        image: grafana/loki:latest
        container_name: chess-loki
        ports:
            - "3100:3100"
        networks:
            - chess-network
        command: -config.file=/etc/loki/local-config.yaml
        restart: unless-stopped

    tempo:
        image: grafana/tempo:latest
        container_name: chess-tempo
        networks:
            - chess-network
        command: [ "-config.file=/etc/tempo.yaml" ]
        volumes:
            - ./tempo.yml:/etc/tempo.yaml
        ports:
            - "3200:3200"
            - "4317:4317"
            - "4318:4318"
        restart: unless-stopped

    promtail:
        image: grafana/promtail:latest
        container_name: chess-promtail
        restart: unless-stopped
        networks:
            - chess-network
        volumes:
            - ./logs:/var/log
            - ./promtail-config.yml:/etc/promtail/config.yml
        command: -config.file=/etc/promtail/config.yml
        depends_on:
            - loki

    grafana:
        image: grafana/grafana:latest
        container_name: chess-grafana
        restart: unless-stopped
        ports:
            - "3000:3000"
        networks:
            - chess-network
        volumes:
            - grafana_data:/var/lib/grafana
        environment:
            - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
        depends_on:
            - prometheus
            - loki
            - tempo

networks:
    chess-network:
        driver: bridge

volumes:
    postgres_data:
    prometheus_data:
    grafana_data:
    sonarqube_db_data:
