services:
    db:
        image: postgres:15-alpine
        container_name: chess-postgres
        restart: always
        environment:
            POSTGRES_DB: chess_db
            POSTGRES_USER: ${CHESS_DB_USERNAME}
            POSTGRES_PASSWORD: ${CHESS_DB_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${CHESS_DB_USERNAME} -d chess_db"]
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: chess-redis
        restart: always
        ports:
            - "6379:6379"
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 5

    backend:
        build: ./chess-backend
        container_name: chess-server
        restart: always
        ports:
            - "8080:8080"
        environment:
            CHESS_DB_URL: jdbc:postgresql://db:5432/chess_db
            CHESS_DB_USERNAME: ${CHESS_DB_USERNAME}
            CHESS_DB_PASSWORD: ${CHESS_DB_PASSWORD}
            CHESS_REDIS_HOST: redis
            CHESS_REDIS_PORT: 6379
            CHESS_JWT_SECRET: ${CHESS_JWT_SECRET}
            CHESS_JWT_EXPIRATION: ${CHESS_JWT_EXPIRATION}
            SPRING_LIQUIBASE_ENABLED: "true"
            MANAGEMENT_OTLP_TRACING_ENDPOINT: http://tempo:4317
            MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy

    frontend:
        build: ./chess-frontend
        container_name: chess-ui
        restart: always
        ports:
            - "80:80"
        environment:
            - VITE_API_URL=http://localhost:8080/api
        depends_on:
            - backend

    prometheus:
        image: prom/prometheus:latest
        container_name: chess-prometheus
        restart: unless-stopped
        volumes:
            - ./prometheus.yml:/etc/prometheus/prometheus.yml
            - prometheus_data:/prometheus
        command:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
        ports:
            - "9090:9090"
        depends_on:
            - backend

    loki:
        image: grafana/loki:latest
        container_name: chess-loki
        ports:
            - "3100:3100"
        command: -config.file=/etc/loki/local-config.yaml
        restart: unless-stopped

    tempo:
        image: grafana/tempo:latest
        container_name: chess-tempo
        command: [ "-config.file=/etc/tempo.yaml" ]
        volumes:
            - ./tempo.yml:/etc/tempo.yaml
        ports:
            - "3200:3200"
            - "4317:4317"
        restart: unless-stopped

    grafana:
        image: grafana/grafana:latest
        container_name: chess-grafana
        restart: unless-stopped
        ports:
            - "3000:3000"
        volumes:
            - grafana_data:/var/lib/grafana
        environment:
            - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
        depends_on:
            - prometheus
            - loki
            - tempo

volumes:
    postgres_data:
    prometheus_data:
    grafana_data:
